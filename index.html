<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Token Calendar</title>
<style>
:root {
  --bg: #0E0E14;
  --s1: rgba(255,255,255,.07);
  --s2: rgba(255,255,255,.11);
  --s3: rgba(255,255,255,.05);
  --accent: #D97757;
  --accent-soft: rgba(217,119,87,.15);
  --accent-glow: rgba(217,119,87,.30);
  --text: #FFFFFF;
  --muted: rgba(255,255,255,.42);
  --muted2: rgba(255,255,255,.22);
  --sep: rgba(255,255,255,.045);
  --r-sm: 12px; --r-md: 18px; --r-lg: 24px; --r-full: 99px;
  --positive: #30D158; --caution: #FF9F0A; --negative: #FF453A; --info: #0A84FF;
  --text-xs: 11px; --text-sm: 13px; --text-base: 15px;
  --text-lg: 17px; --text-xl: 20px; --text-2xl: 26px;
  --fw-medium: 500; --fw-semibold: 600; --fw-bold: 700; --fw-heavy: 800;
  --dur-fast: 120ms; --dur-normal: 280ms;
  --ease-smooth: cubic-bezier(.4,0,.2,1);
  --ease-bounce: cubic-bezier(.34,1.56,.64,1);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'PingFang SC', 'SF Pro Rounded', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding-bottom: 40px;
  max-width: 480px; margin: 0 auto;
  transition: background .3s, color .3s;
}
body.sheet-open { position: fixed; width: 100%; overflow-y: scroll; }

/* ── light mode ── */
body.light {
  --bg: #F2F2F7;
  --s1: rgba(255,255,255,.9);
  --s2: rgba(0,0,0,.06);
  --s3: rgba(0,0,0,.03);
  --text: #1C1C1E;
  --muted: rgba(60,60,67,.52);
  --muted2: rgba(60,60,67,.3);
  --sep: rgba(60,60,67,.08);
}
body.light .topbar { background: rgba(242,242,247,.9); }
body.light .topbar::after { background: linear-gradient(to bottom, rgba(242,242,247,.5) 0%, transparent 100%); }
body.light .sheet, body.light .settings-sheet { background: rgba(240,240,248,.97); }
body.light .sheet-handle { background: rgba(60,60,67,.2); }

/* ── topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,10,18,.88);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  padding: 14px 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar::after {
  content: ''; position: absolute; top: 100%; left: 0; right: 0; height: 28px;
  background: linear-gradient(to bottom, rgba(10,10,18,.5) 0%, transparent 100%);
  pointer-events: none;
}
.topbar-left, .topbar-right { display: flex; align-items: center; gap: 6px; }
.month-title {
  font-size: 16px; font-weight: var(--fw-heavy); letter-spacing: -.2px;
  position: absolute; left: 50%; transform: translateX(-50%);
  cursor: pointer; user-select: none;
  transition: color .15s;
}
.month-title:active { color: var(--accent); }
.icon-btn {
  background: var(--s1); border: 1px solid var(--sep); color: var(--muted);
  width: 34px; height: 34px; border-radius: 50%;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform var(--dur-fast), color .15s, background .15s;
}
.icon-btn:active { transform: scale(.88); color: var(--text); }

/* ── summary bar ── */
.summary {
  margin: 14px 16px 10px;
  background: var(--s1); border: 1px solid var(--sep);
  border-radius: var(--r-md); padding: 14px 16px;
  display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 4px;
}
.summary-item { display: flex; flex-direction: column; gap: 3px; }
.summary-item:not(:first-child) { padding-left: 14px; }
.summary-label { font-size: var(--text-xs); color: var(--muted); font-weight: var(--fw-medium); letter-spacing: .3px; text-transform: uppercase; }
.summary-val { font-size: var(--text-lg); font-weight: var(--fw-heavy); color: var(--text); letter-spacing: -.3px; }
.summary-sub { font-size: var(--text-xs); color: var(--muted); }
/* ── all-time card ── */
.all-time-card {
  margin: 0 16px 28px;
  background: var(--s1); border: 1px solid var(--sep);
  border-radius: var(--r-md);
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;
  overflow: hidden;
}
.at-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 12px 8px;
}
.at-divider { display: none; }
.at-label { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
.at-cost { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -.8px; line-height: 1; }
.at-tokens { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.4px; }
.at-days { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.4px; }

/* ── legend ── */
.legend { margin: 0 16px 12px; display: grid; grid-template-columns: repeat(3,auto); justify-content: start; gap: 6px 14px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 3px; }

/* ── calendar ── */
.cal { margin: 0 16px 12px; }
.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
.cal-dow span { text-align: center; font-size: 10px; font-weight: var(--fw-bold); color: var(--muted2); padding: 3px 0; letter-spacing: .3px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }

@keyframes cellIn {
  from { opacity: 0; transform: translateY(8px) scale(.88); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes gridSlideLeft  { from { transform: translateX(16px); } to { transform: translateX(0); } }
@keyframes gridSlideRight { from { transform: translateX(-16px); } to { transform: translateX(0); } }
.cal-grid.slide-left  { animation: gridSlideLeft  .26s var(--ease-smooth) both; }
.cal-grid.slide-right { animation: gridSlideRight .26s var(--ease-smooth) both; }
.cal-cell.anim-in { animation: cellIn .32s var(--ease-bounce) both; }

.cal-cell {
  aspect-ratio: 1; border-radius: 16px;
  background: var(--s3); border: 1px solid transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: transform var(--dur-fast), box-shadow var(--dur-fast), background .3s, border-color .3s;
  gap: 0;
}
.cal-cell:active { transform: scale(.92); }
.cal-cell.empty  { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
.cal-cell.future { opacity: .3; pointer-events: none; }
.cal-cell.today  { border-color: var(--accent) !important; }
.cal-cell .day-num { font-size: 13px; font-weight: 700; line-height: 1; letter-spacing: -.3px; }
.cal-cell .day-tok { font-size: 10px; font-weight: 500; line-height: 1; opacity: .8; margin-top: 1px; }
.cal-cell .day-pending { font-size: 9px; font-weight: 500; opacity: .45; margin-top: 1px; }

.cal-cell.tier-free { background: rgba(255,255,255,.04); }
.cal-cell.tier-low,  .heat-cell.tier-low  { background: var(--tier1); border-color: var(--tier1b); }
.cal-cell.tier-mid,  .heat-cell.tier-mid  { background: var(--tier2); border-color: var(--tier2b); }
.cal-cell.tier-high, .heat-cell.tier-high { background: var(--tier3); border-color: var(--tier3b); }
.cal-cell.tier-peak, .heat-cell.tier-peak { background: var(--tier4); border-color: var(--tier4b); box-shadow: 0 0 10px var(--accent-glow); }

body.light .cal-cell.tier-free { background: rgba(0,0,0,.05); }
body.light .cal-cell.tier-low,  body.light .heat-cell.tier-low  { background: var(--ltier1); border-color: var(--ltier1b); }
body.light .cal-cell.tier-mid,  body.light .heat-cell.tier-mid  { background: var(--ltier2); border-color: var(--ltier2b); }
body.light .cal-cell.tier-high, body.light .heat-cell.tier-high { background: var(--ltier3); border-color: var(--ltier3b); }
body.light .cal-cell.tier-peak, body.light .heat-cell.tier-peak { background: var(--ltier4); border-color: var(--ltier4b); box-shadow: 0 0 8px var(--accent-soft); }
body.light .cal-cell .day-num  { color: #3C3C43; }
body.light .cal-cell .day-tok  { color: #3C3C43; }
body.light .cal-cell.tier-high .day-num,
body.light .cal-cell.tier-high .day-tok,
body.light .cal-cell.tier-peak .day-num,
body.light .cal-cell.tier-peak .day-tok { color: rgba(255,255,255,.92); }
.cal-cell.tier-high .day-num,
.cal-cell.tier-high .day-tok,
.cal-cell.tier-peak .day-num,
.cal-cell.tier-peak .day-tok { color: rgba(255,255,255,.95); }

/* legend dot tier classes */
.legend-dot.t1 { background: var(--tier1); }
.legend-dot.t2 { background: var(--tier2); }
.legend-dot.t3 { background: var(--tier3); }
.legend-dot.t4 { background: var(--tier4); }
body.light .legend-dot.t1 { background: var(--ltier1); }
body.light .legend-dot.t2 { background: var(--ltier2); }
body.light .legend-dot.t3 { background: var(--ltier3); }
body.light .legend-dot.t4 { background: var(--ltier4); }

/* ── month insights ── */
.insights { margin: 0 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.insight-stats { display: flex; gap: 10px; }
.stat-card { flex: 1; background: var(--s1); border: 1px solid var(--sep); border-radius: var(--r-sm); padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; color: var(--muted); font-weight: var(--fw-medium); letter-spacing: .3px; text-transform: uppercase; }
.stat-val { font-size: var(--text-lg); font-weight: var(--fw-heavy); color: var(--text); letter-spacing: -.3px; }
.stat-sub { font-size: 10px; color: var(--muted); }
.model-bar-section { background: var(--s1); border: 1px solid var(--sep); border-radius: var(--r-sm); padding: 10px 12px; }
.model-bar-label { font-size: 10px; color: var(--muted); font-weight: var(--fw-medium); letter-spacing: .3px; text-transform: uppercase; margin-bottom: 8px; }
.model-bar-track { height: 8px; border-radius: 4px; overflow: hidden; display: flex; background: var(--s2); margin-bottom: 8px; }
.model-bar-seg { height: 100%; transition: width .4s var(--ease-smooth); }
.model-bar-legend { display: flex; flex-wrap: wrap; gap: 5px 12px; }
.model-bar-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
.model-bar-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }

/* ── mini heatmap grid (weekly / monthly) ── */
.heat-section { background: var(--s1); border: 1px solid var(--sep); border-radius: var(--r-sm); padding: 10px 12px; }
.heat-label { font-size: 10px; color: var(--muted); font-weight: var(--fw-medium); letter-spacing: .3px; text-transform: uppercase; margin-bottom: 8px; }
.heat-grid { display: grid; gap: 5px; }
#viewGrid { margin: 0 16px 20px; }
.heat-cell {
  border-radius: 16px; border: 1px solid transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; cursor: default; min-height: 56px;
  transition: background .3s, border-color .3s;
  position: relative; overflow: hidden;
}
.heat-cell.heat-empty { background: var(--s3); }
body.light .heat-cell.heat-empty { background: rgba(0,0,0,.05); }
.heat-cell.heat-cur  { border-color: var(--accent) !important; }
.heat-cell .h-top { font-size: 10px; font-weight: 700; line-height: 1; letter-spacing: -.2px; }
.heat-cell .h-bot { font-size: 9px; font-weight: 500; line-height: 1; opacity: .8; margin-top: 1px; }
.heat-cell.tier-low .h-top, .heat-cell.tier-low .h-bot,
.heat-cell.tier-mid .h-top, .heat-cell.tier-mid .h-bot { color: inherit; }
.heat-cell.tier-high .h-top, .heat-cell.tier-high .h-bot,
.heat-cell.tier-peak .h-top, .heat-cell.tier-peak .h-bot { color: rgba(255,255,255,.95); }
body.light .heat-cell.tier-high .h-top, body.light .heat-cell.tier-high .h-bot,
body.light .heat-cell.tier-peak .h-top, body.light .heat-cell.tier-peak .h-bot { color: rgba(255,255,255,.92); }
/* ── time tab bar (日/周/月/年 + 量/$ toggle) ── */
.time-tab-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 16px 8px; padding-bottom: 0;
}
.tab-group {
  display: flex; align-items: center;
  background: var(--s1); border-radius: 99px; padding: 3px;
}
.time-tab {
  background: none; border: none; padding: 5px 13px;
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; border-radius: 99px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.time-tab.active { background: var(--accent); color: #fff; }
/* dtype toggle pill — identical style to tab-group */
.dtype-toggle {
  display: flex; align-items: center;
  background: var(--s1); border-radius: 99px; padding: 3px;
}
.dtype-btn {
  padding: 5px 11px; font-size: 13px; font-weight: 700;
  border: none; background: none; color: var(--muted);
  cursor: pointer; border-radius: 99px;
  transition: background .15s, color .15s;
}
.dtype-btn.active { background: var(--accent); color: #fff; }
/* ── sub nav row (‹ [pill] ›) ── */
.sub-nav-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin: 8px 16px 4px;
}
.snav-arrow {
  background: none; border: none; color: var(--muted);
  font-size: 22px; line-height: 1; cursor: pointer; padding: 4px 6px;
  transition: color .1s; min-width: 32px; text-align: center;
}
.snav-arrow:active { color: var(--text); }
.snav-arrow[style*=".25"] { pointer-events: none; }
.snav-pill {
  font-size: 14px; font-weight: 600; color: var(--text);
  padding: 4px 18px; border: 1px solid var(--sep);
  border-radius: 20px; min-width: 120px; text-align: center;
  background: var(--s1);
}

/* ── bottom sheet (day detail) ── */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 20;
  background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-normal) var(--ease-smooth);
}
.sheet-backdrop.visible { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 50%; z-index: 21;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: #141420; border-radius: 24px 24px 0 0;
  padding: 0 0 max(40px, env(safe-area-inset-bottom, 40px));
  transition: transform var(--dur-normal) var(--ease-smooth);
  box-shadow: var(--shadow-lg);
}
.sheet.visible { transform: translateX(-50%) translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.18); margin: 12px auto 20px; position: relative; }
.sheet-handle::before { content: ''; position: absolute; inset: -16px -40px; }
.sheet-content { padding: 0 20px; }
.sheet-date { font-size: var(--text-sm); color: var(--muted); font-weight: var(--fw-medium); margin-bottom: 12px; }
.sheet-cost-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
.sheet-cost-usd { font-size: var(--text-2xl); font-weight: var(--fw-heavy); letter-spacing: -.5px; }
.sheet-cost-cny { font-size: var(--text-sm); color: var(--muted); font-weight: var(--fw-medium); }
.sheet-tokens { font-size: var(--text-sm); color: var(--muted); margin-bottom: 20px; }
.sheet-divider { height: 1px; background: var(--sep); margin-bottom: 16px; }
.sheet-models-label { font-size: var(--text-xs); color: var(--muted2); letter-spacing: .4px; text-transform: uppercase; font-weight: var(--fw-semibold); margin-bottom: 10px; }
.model-tag { display: inline-flex; align-items: center; background: var(--s1); border: 1px solid var(--sep); border-radius: var(--r-full); padding: 5px 12px; font-size: var(--text-xs); color: var(--muted); font-weight: var(--fw-medium); margin: 0 6px 6px 0; }

/* ── settings sheet ── */
.settings-sheet {
  position: fixed; bottom: 0; left: 50%; z-index: 31;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: #141420; border-radius: 24px 24px 0 0;
  padding: 0 0 max(44px, env(safe-area-inset-bottom, 44px));
  transition: transform var(--dur-normal) var(--ease-smooth);
  box-shadow: var(--shadow-lg);
}
.settings-sheet.visible { transform: translateX(-50%) translateY(0); }
.set-title { font-size: var(--text-lg); font-weight: var(--fw-heavy); padding: 20px 20px 16px; }
.set-section { padding: 0 20px 18px; border-bottom: 1px solid var(--sep); margin-bottom: 18px; }
.set-section:last-child { border-bottom: none; margin-bottom: 0; }
.set-label { font-size: var(--text-xs); color: var(--muted2); letter-spacing: .4px; text-transform: uppercase; font-weight: var(--fw-semibold); margin-bottom: 12px; }
.mode-row { display: flex; gap: 8px; }
.mode-btn {
  flex: 1; padding: 10px; border-radius: var(--r-sm);
  background: var(--s1); border: 1.5px solid var(--sep);
  color: var(--muted); font-size: var(--text-sm); font-weight: var(--fw-semibold);
  cursor: pointer; text-align: center;
  transition: border-color .15s, color .15s, background .15s;
}
.mode-btn.on { border-color: var(--accent); color: var(--text); background: var(--accent-soft); }
.swatch-row { display: flex; gap: 10px; }
.swatch {
  width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: var(--fw-heavy); color: transparent;
  transition: transform .12s, border-color .15s;
}
.swatch.on { border-color: var(--text); color: white; transform: scale(1.1); }
.swatch:active { transform: scale(.9); }
.set-import-btn {
  width: 100%; padding: 13px; border-radius: var(--r-sm);
  background: var(--accent); border: none; color: #fff;
  font-size: var(--text-base); font-weight: var(--fw-bold); cursor: pointer;
  transition: opacity .15s, transform var(--dur-fast);
}
.set-import-btn:active { opacity: .85; transform: scale(.98); }

/* ── import modal ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-normal);
}
.modal-backdrop.visible { opacity: 1; pointer-events: all; }
.modal {
  background: #1C1C2E; border-radius: var(--r-lg);
  padding: 24px; width: 100%; max-width: 440px;
  border: 1px solid var(--accent-soft);
  transform: scale(.94);
  transition: transform var(--dur-normal) var(--ease-bounce);
}
.modal-backdrop.visible .modal { transform: scale(1); }
.modal-title { font-size: var(--text-lg); font-weight: var(--fw-heavy); margin-bottom: 6px; }
.modal-hint { font-size: var(--text-sm); color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.modal-hint code { background: var(--s2); border-radius: 4px; padding: 1px 5px; font-family: 'SF Mono', monospace; font-size: 11px; color: var(--accent); }
.modal-error { font-size: var(--text-xs); color: var(--negative); margin-bottom: 8px; min-height: 16px; }
.modal textarea { width: 100%; height: 140px; background: var(--s1); border: 1px solid var(--sep); border-radius: var(--r-sm); color: var(--text); padding: 10px 12px; font-family: 'SF Mono', monospace; font-size: 11px; resize: none; outline: none; margin-bottom: 14px; }
.modal textarea:focus { border-color: var(--accent-glow); }
.modal-btns { display: flex; gap: 10px; }
.btn-cancel { flex: 1; padding: 12px; border-radius: var(--r-sm); background: var(--s1); border: 1px solid var(--sep); color: var(--muted); font-size: var(--text-sm); font-weight: var(--fw-semibold); cursor: pointer; transition: transform var(--dur-fast); }
.btn-cancel:active { transform: scale(.96); }
.btn-import { flex: 2; padding: 12px; border-radius: var(--r-sm); background: var(--accent); border: none; color: #fff; font-size: var(--text-sm); font-weight: var(--fw-bold); cursor: pointer; transition: transform var(--dur-fast), opacity var(--dur-fast); }
.btn-import:active { transform: scale(.96); opacity: .85; }
.modal-file-btn {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 10px 14px; background: var(--s1);
  border: 1px dashed var(--sep); border-radius: var(--r-sm);
  color: var(--muted); font-size: var(--text-sm); cursor: pointer;
  margin-bottom: 10px; transition: border-color .2s, color .2s;
}
.modal-file-btn:hover { border-color: var(--accent); color: var(--text); }
.modal-file-btn input[type=file] { display: none; }
.modal-preview { font-size: var(--text-xs); color: var(--accent); margin-bottom: 6px; min-height: 16px; }

/* ── poster overlay ── */
#poster-overlay {
  position: fixed; inset: 0; z-index: 600;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0; gap: 0;
  touch-action: none;
  background: #0B0B10;
  overflow: hidden;
}
#poster-overlay .po-ball {
  position: absolute; border-radius: 50%; pointer-events: none;
}
#poster-overlay .po-close {
  position: absolute; top: 16px; right: 18px; z-index: 10;
  background: rgba(0,0,0,.2); border: none; color: #fff;
  width: 30px; height: 30px; border-radius: 50%; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: inherit;
}
.poster-card {
  position: relative; z-index: 2;
  width: calc(100% - 40px); max-width: 320px;
  background: #16161D;
  border-radius: 22px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
  font-family: -apple-system, 'PingFang SC', 'SF Pro Rounded', sans-serif;
  color: #fff;
}
.pc-card-top { padding: 16px 20px 12px; position: relative; overflow: hidden; background: rgba(255,255,255,.03); }
.pc-card-top::after { content: ''; position: absolute; width: 120px; height: 120px; border-radius: 50%; background: var(--accent-soft); top: -40px; right: -30px; }
.pc-app-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.pc-app-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #F0A882, #D97757);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.pc-app-name { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -.02em; }
.pc-app-desc { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.45); margin-top: 1px; }
.pc-data { padding: 12px 20px 10px; }
.pc-data-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
.pc-data-item { text-align: center; flex: 1; }
.pc-data-val { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -.04em; line-height: 1; margin-bottom: 4px; }
.pc-data-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.4); letter-spacing: .03em; }
.pc-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 4px 14px 10px; }
.pc-dow { text-align: center; font-size: 8px; font-weight: 800; color: rgba(255,255,255,.3); padding: 2px 0; }
.pc-mday {
  aspect-ratio: 1; border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; background: rgba(255,255,255,.03);
}
.pc-mday.empty { background: transparent; }
.pc-mday .mday-num { font-size: 7px; font-weight: 700; line-height: 1; color: rgba(255,255,255,.35); }
.pc-mday .mday-tok { font-size: 6px; font-weight: 800; line-height: 1; }
.pc-mday.today .mday-num { color: #D97757; font-weight: 900; }
.pc-mday.future .mday-num { color: rgba(255,255,255,.15); }
.pc-foot { padding: 10px 20px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-top: 1px solid rgba(255,255,255,.07); }
.pc-foot-left { flex: 1; }
.pc-by { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.4); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 3px; }
.pc-name { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -.04em; line-height: 1; margin-bottom: 4px; }
.pc-built { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.4); letter-spacing: .04em; }
.pc-qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.pc-qr-img { width: 58px; height: 58px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,.12); display: block; }
.pc-qr-hint { font-size: 8px; font-weight: 700; color: rgba(255,255,255,.4); letter-spacing: .06em; text-transform: uppercase; }
.po-save-btn {
  position: relative; z-index: 2; margin-top: 18px;
  width: calc(100% - 40px); max-width: 320px;
  background: rgba(0,0,0,.22); color: #fff;
  border: 1.5px solid rgba(255,255,255,.32); border-radius: 14px;
  font-size: 15px; font-weight: 800; padding: 13px;
  cursor: pointer; font-family: inherit;
  backdrop-filter: blur(8px);
  transition: transform .12s, opacity .12s;

.po-save-btn:active { transform: scale(.97); opacity: .9; }

/* ── sync toast ── */
.sync-toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--s1); border: 1px solid var(--sep); color: var(--muted);
  padding: 9px 18px; border-radius: var(--r-full); font-size: var(--text-sm);
  white-space: nowrap; opacity: 0; pointer-events: none; z-index: 99;
  transition: opacity .2s var(--ease-smooth), transform .2s var(--ease-smooth);
}
.sync-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.sync-toast.ok  { border-color: var(--positive); color: var(--positive); }
.sync-toast.err { border-color: var(--negative); color: var(--negative); }

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e){}

function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getData() {
  const stored = loadData();
  if (!Object.keys(stored).length) { saveData(SEED); return {...SEED}; }
  return {...SEED, ...stored};
}

// ── format ──
function fmtTokensWest(t) {
  // 欧美计数：B > M > K
  if (t >= 1000000000) return (t/1000000000).toFixed(2) + 'B';
  if (t >= 1000000)    return (t/1000000).toFixed(0) + 'M';
  if (t >= 1000)       return (t/1000).toFixed(0) + 'K';
  return t.toString();
}
function fmtTokensSub(t) {
  if (_lang === 'en') {
    if (t >= 1000000000) return (t/1000000000).toFixed(2) + 'B';
    if (t >= 1000000)    return (t/1000000).toFixed(0) + 'M';
    return '';
  }
  if (t >= 100000000) return (t/100000000).toFixed(2) + '亿';
  if (t >= 10000000)  return (t/100000000).toFixed(2) + '亿';
  if (t >= 1000000)   return (t/10000).toFixed(0) + '万';
  return '';
}
function fmtTokenShort(t) {
  if (t >= 1000000000) return (t/1000000000).toFixed(1) + 'B';
  if (t >= 1000000)    return Math.round(t/1000000) + 'M';
  if (t >= 1000)       return Math.round(t/1000) + 'K';
  if (t > 0)           return t.toString();
  return '';
}
function fmtTokenCN(t) {
  if (!t || t === 0) return '';
  if (_lang === 'en') {
    if (t >= 1000000000) return (t/1000000000).toFixed(1).replace(/\.0$/,'') + 'B';
    if (t >= 1000000)    return Math.round(t/1000000) + 'M';
    return String(t);
  }
  if (t >= 100000000) return (t/100000000).toFixed(1).replace(/\.0$/, '') + '亿';
  if (t >= 10000)     return Math.round(t/10000) + '万';
  return String(t);
}
function tierClass(tokens) {
  if (!tokens || tokens === 0) return 'tier-free';
  if (tokens < 10000000)  return 'tier-low';
  if (tokens < 30000000)  return 'tier-mid';
  if (tokens < 60000000)  return 'tier-high';
  return 'tier-peak';
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function setTierVars(color) {
  const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
  // Convert to HSL
  const rn=r/255, gn=g/255, bn=b/255;
  const max=Math.max(rn,gn,bn), min=Math.min(rn,gn,bn), d=max-min;
  let h=0, s=0, l=(max+min)/2;
  if (d > 0) {
    s = d / (1 - Math.abs(2*l - 1));
    if (max===rn) h = ((gn-bn)/d + 6) % 6;
    else if (max===gn) h = (bn-rn)/d + 2;
    else h = (rn-gn)/d + 4;
    h = Math.round(h * 60);
  }
  // Generate 4 tiers: same hue, increasing lightness, saturated
  const hsl = (sat, lig) => `hsl(${h},${Math.round(sat*100)}%,${Math.round(lig*100)}%)`;
  const s1 = document.documentElement.style;
  // Dark mode tiers: warm dark → vivid, max L=46% keeps white text legible
  s1.setProperty('--tier1',  hsl(.45, .16)); s1.setProperty('--tier1b', hsl(.50, .24));
  s1.setProperty('--tier2',  hsl(.62, .26)); s1.setProperty('--tier2b', hsl(.65, .36));
  s1.setProperty('--tier3',  hsl(.78, .36)); s1.setProperty('--tier3b', hsl(.80, .46));
  s1.setProperty('--tier4',  hsl(.88, .46)); s1.setProperty('--tier4b', hsl(.90, .56));
  // Light mode: near-neutral low tiers (no peach), vivid orange for high
  s1.setProperty('--ltier1', hsl(.18, .94)); s1.setProperty('--ltier1b', hsl(.22, .88));
  s1.setProperty('--ltier2', hsl(.32, .86)); s1.setProperty('--ltier2b', hsl(.36, .78));
  s1.setProperty('--ltier3', hsl(.78, .46)); s1.setProperty('--ltier3b', hsl(.80, .38));
  s1.setProperty('--ltier4', hsl(.88, .36)); s1.setProperty('--ltier4b', hsl(.88, .28));
}

function renderSummary() {
  const data = getData();
  let totalCost=0, totalTokens=0, activeDays=0, peakCost=0;
  const isYearly  = _viewTab === 'yearly';
  const isMonthly = _viewTab === 'monthly';
  if (isYearly) {
    Object.values(data).forEach(v => {
      totalCost += v.cost; totalTokens += v.tokens;
      if (v.cost > 0) activeDays++;
      if (v.cost > peakCost) peakCost = v.cost;
    });
    document.getElementById('sumLabel1').textContent = t('allTimeCost');
    document.getElementById('sumLabel3').textContent = t('dailyAvg');
  } else if (isMonthly) {
    const yStr = String(_monthlyViewYear);
    Object.entries(data).forEach(([d,v]) => {
      if (!d.startsWith(yStr)) return;
      totalCost += v.cost; totalTokens += v.tokens;
      if (v.cost > 0) activeDays++;
      if (v.cost > peakCost) peakCost = v.cost;
    });
    document.getElementById('sumLabel1').textContent = t('yearlyCost');
    document.getElementById('sumLabel3').textContent = t('dailyAvg');
  } else {
    const prefix = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
    Object.entries(data).forEach(([d,v]) => {
      if (!d.startsWith(prefix)) return;
      totalCost += v.cost; totalTokens += v.tokens;
      if (v.cost > 0) activeDays++;
      if (v.cost > peakCost) peakCost = v.cost;
    });
    document.getElementById('sumLabel1').textContent = t('monthlyCost');
    document.getElementById('sumLabel3').textContent = t('dailyAvg');
  }
  const avg = activeDays > 0 ? totalCost / activeDays : 0;
  document.getElementById('sumCost').textContent  = totalCost  > 0 ? `$${totalCost.toFixed(2)}` : '—';
  document.getElementById('sumCny').textContent   = totalCost  > 0 ? `≈ ¥${Math.round(totalCost*CNY_RATE).toLocaleString()}` : '';
  document.getElementById('sumToken').textContent = totalTokens> 0 ? fmtTokensWest(totalTokens) : '—';
  const sub = totalTokens > 0 ? fmtTokensSub(totalTokens) : '';
  const dayStr = activeDays > 0 ? (_lang==='en' ? `${activeDays} days` : `${activeDays}日`) : '';
  document.getElementById('sumTokenSub').textContent = [sub, dayStr].filter(Boolean).join(' · ');
  document.getElementById('sumAvg').textContent   = avg        > 0 ? `$${avg.toFixed(2)}` : '—';
  document.getElementById('sumPeak').textContent  = peakCost   > 0 ? `${t('peak')} $${peakCost.toFixed(2)}` : '';
  // all-time totals
  let allCost=0, allTokens=0, allDays=0;
  Object.values(getData()).forEach(v => { allCost+=v.cost||0; allTokens+=v.tokens||0; if(v.cost>0) allDays++; });
  document.getElementById('sumAllCost').textContent   = allCost > 0 ? `$${allCost.toFixed(2)}` : '—';
  document.getElementById('sumAllTokens').textContent = allTokens > 0 ? fmtTokenCN(allTokens) : '—';
  document.getElementById('sumAllDays').textContent   = allDays > 0 ? `${allDays}` : '—';
  document.getElementById('atLabel').textContent = t('allTime');
  if(document.getElementById('atLabelTok')) document.getElementById('atLabelTok').textContent = _lang==='en'?'Tokens':'Token';
  if(document.getElementById('atLabelDays')) document.getElementById('atLabelDays').textContent = _lang==='en'?'Days':'天数';
}

function renderGrid() {
  const data  = getData();
  const grid  = document.getElementById('calGrid');
  const first = new Date(curYear, curMonth, 1).getDay();
  const days  = new Date(curYear, curMonth+1, 0).getDate();
  const prefix= `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
  grid.innerHTML = '';

  if (_navDir !== 0) {
    grid.classList.remove('slide-left', 'slide-right');
    void grid.offsetWidth;
    grid.classList.add(_navDir > 0 ? 'slide-left' : 'slide-right');
  }
  _navDir = 0;

  for (let i=0; i<first; i++) { const e=document.createElement('div'); e.className='cal-cell empty'; grid.appendChild(e); }
  const isCurrentMonth = curYear===today.getFullYear() && curMonth===today.getMonth();
  let cellIdx = 0;
  for (let d=1; d<=days; d++) {
    const key = `${prefix}-${String(d).padStart(2,'0')}`;
    const rec = data[key];
    const isToday  = isCurrentMonth && d===today.getDate();
    const isFuture = isCurrentMonth && d>today.getDate();
    const el = document.createElement('div');
    el.className = 'cal-cell anim-in' + (isFuture?' future':'') + (!isFuture&&rec?' '+tierClass(rec.tokens):'') + (isToday?' today':'');
    el.style.animationDelay = `${cellIdx * 13}ms`;
    const num = document.createElement('div');
    num.className = 'day-num'; num.textContent = d;
    el.appendChild(num);
    if (!isFuture && rec && (rec.tokens > 0 || rec.cost > 0)) {
      const tok = document.createElement('div');
      tok.className = 'day-tok';
      tok.textContent = _dataType === 'cost'
        ? (rec.cost > 0 ? `$${rec.cost.toFixed(2)}` : '')
        : fmtTokenShort(rec.tokens);
      if (tok.textContent) el.appendChild(tok);
    } else if (isToday && !rec) {
      const tok = document.createElement('div');
      tok.className = 'day-tok day-pending'; tok.textContent = t('pending');
      el.appendChild(tok);
    }
    if (!isFuture && rec) el.onclick = () => openSheet(key, rec);
    grid.appendChild(el);
    cellIdx++;
  }
}

function renderInsights() {
  const data = getData();
  const prefix = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
  const days = new Date(curYear, curMonth+1, 0).getDate();
  let activeDays = 0, maxStreak = 0, curStreak = 0;
  const modelTokens = {};
  for (let d = 1; d <= days; d++) {
    const rec = data[`${prefix}-${String(d).padStart(2,'0')}`];
    if (rec && rec.tokens > 0) {
      activeDays++; curStreak++; maxStreak = Math.max(maxStreak, curStreak);
      (rec.models || []).forEach(m => { modelTokens[m] = (modelTokens[m] || 0) + rec.tokens; });
    } else { curStreak = 0; }
  }
  const el = document.getElementById('insights');
  if (activeDays === 0) { el.innerHTML = ''; return; }
  const MODEL_COLORS = [1, .72, .50, .34, .22].map(a => hexToRgba(accentColor, a));
  const sorted = Object.entries(modelTokens).sort((a,b) => b[1]-a[1]).slice(0,5);
  const total = sorted.reduce((s,[,t]) => s+t, 0);
  const segs = sorted.map(([,t],i) =>
    `<div class="model-bar-seg" style="width:${(t/total*100).toFixed(1)}%;background:${MODEL_COLORS[i]}"></div>`
  ).join('');
  const items = sorted.map(([m,t],i) => {
    const name = m.startsWith('claude-') ? m.replace('claude-','') : m.split(' ')[0];
    return `<div class="model-bar-item"><div class="model-bar-dot" style="background:${MODEL_COLORS[i]}"></div>${name} ${(t/total*100).toFixed(0)}%</div>`;
  }).join('');
  el.innerHTML = `
    <div class="insight-stats">
      <div class="stat-card"><div class="stat-label">${t('activeDays')}</div><div class="stat-val">${activeDays}</div><div class="stat-sub">${_lang==='en'?`of ${days} days`:`共 ${days} 天`}</div></div>
      <div class="stat-card"><div class="stat-label">${t('streak')}</div><div class="stat-val">${maxStreak}</div><div class="stat-sub">${_lang==='en'?'days':'天'}</div></div>
    </div>
    ${sorted.length ? `<div class="model-bar-section"><div class="model-bar-label">${t('models')}</div><div class="model-bar-track">${segs}</div><div class="model-bar-legend">${items}</div></div>` : ''}`;
}

function renderMainContent() {
  const calWrap  = document.getElementById('calWrap');
  const viewGrid = document.getElementById('viewGrid');
  const insights = document.getElementById('insights');
  if (_viewTab === 'daily') {
    calWrap.style.display  = '';

    insights.style.display = '';

    renderInsights();
  } else {
    calWrap.style.display  = 'none';
    insights.style.display = 'none';
    insights.innerHTML = '';
    if (_viewTab === 'weekly')  renderWeeklyView();
    else if (_viewTab === 'monthly') renderMonthlyView();
    else renderYearlyView();
  }
}
function switchViewTab(tab) {
  _viewTab = tab;
  ['daily','weekly','monthly','yearly'].forEach(t =>
    document.getElementById('tab-'+t).classList.toggle('active', t === tab)
  );
  render();
}
function navView(dir) {
  if (_viewTab === 'yearly') return;
  if (_viewTab === 'daily' || _viewTab === 'weekly') {
    _navDir = (_viewTab === 'daily') ? dir : 0;
    curMonth += dir;
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    if (curMonth > 11) { curMonth = 0;  curYear++; }
  } else {
    _monthlyViewYear += dir;
  }
  render();
}
function renderWeeklyView() {
  const data = getData();
  const vy = curYear, vm = curMonth;
  const totalDays = new Date(vy, vm+1, 0).getDate();
  const prefix = `${vy}-${String(vm+1).padStart(2,'0')}`;
  const weeks = [];
  let wk = { cost:0, tokens:0, days:[] };
  for (let d = 1; d <= totalDays; d++) {
    const dow = new Date(vy, vm, d).getDay();
    wk.days.push(d);
    const rec = data[`${prefix}-${String(d).padStart(2,'0')}`];
    if (rec) { wk.cost += rec.cost||0; wk.tokens += rec.tokens||0; }
    if (dow === 6) { weeks.push(wk); wk = {cost:0,tokens:0,days:[]}; }
  }
  if (wk.days.length > 0) {
    if (weeks.length > 0 && wk.days.length <= 2) {
      weeks[weeks.length-1].cost += wk.cost; weeks[weeks.length-1].tokens += wk.tokens; weeks[weeks.length-1].days.push(...wk.days);
    } else { weeks.push(wk); }
  }
  const maxTok = Math.max(...weeks.map(w => _dataType === 'cost' ? w.cost : w.tokens), 1);
  const todayIdx = (vy===today.getFullYear()&&vm===today.getMonth()) ? weeks.findIndex(w=>w.days.includes(today.getDate())) : -1;
  const mm = String(vm+1).padStart(2,'0');
  const cells = weeks.map((w,i) => {
    const tc = w.tokens > 0 ? tierClass(w.tokens/w.days.length) : '';
    const isCur = i === todayIdx;
    const val = _dataType === 'cost'
      ? (w.cost > 0 ? `$${w.cost.toFixed(2)}` : '')
      : fmtTokenCN(w.tokens);
    const d1 = String(w.days[0]).padStart(2,'0'), d2 = String(w.days[w.days.length-1]).padStart(2,'0');
    const label = isCur ? t('thisWeek') : `${mm}.${d1}–${d2}`;
    return `<div class="heat-cell ${tc||'heat-empty'}${isCur?' heat-cur':''}"><div class="h-top">${label}</div>${val?`<div class="h-bot">${val}</div>`:''}</div>`;
  }).join('');
  document.getElementById('viewGrid').innerHTML = `<div class="heat-grid" style="grid-template-columns:repeat(3,1fr)">${cells}</div>`;
}
function renderMonthlyView() {
  const data = getData();
  const vy = _monthlyViewYear;
  const MON = t('mon');
  const cutY = today.getFullYear(), cutM = today.getMonth();
  const months = [];
  for (let m = 0; m < 12; m++) {
    const isFuture = vy > cutY || (vy === cutY && m > cutM);
    if (isFuture) { months.push({ m, isFuture:true, tokens:0, cost:0 }); continue; }
    const prefix = `${vy}-${String(m+1).padStart(2,'0')}`;
    const dim = new Date(vy, m+1, 0).getDate();
    let cost=0, tokens=0;
    for (let d=1; d<=dim; d++) {
      const rec = data[`${prefix}-${String(d).padStart(2,'0')}`];
      if (rec) { cost+=rec.cost||0; tokens+=rec.tokens||0; }
    }
    months.push({ m, isFuture:false, tokens, cost });
  }
  const maxTok = Math.max(...months.map(x => _dataType === 'cost' ? x.cost : x.tokens), 1);
  const cells = months.map(({ m, isFuture, tokens, cost }) => {
    if (isFuture) return `<div class="heat-cell heat-empty" style="opacity:.3"><div class="h-top">${MON[m]}</div></div>`;
    const tc = tokens > 0 ? tierClass(tokens/new Date(vy, m+1, 0).getDate()) : '';
    const isCur = vy===today.getFullYear() && m===today.getMonth();
    const val = _dataType === 'cost'
      ? (cost > 0 ? `$${cost.toFixed(2)}` : '')
      : fmtTokenCN(tokens);
    return `<div class="heat-cell ${tc||'heat-empty'}${isCur?' heat-cur':''}"><div class="h-top">${isCur?t('thisMonth'):MON[m]}</div>${val?`<div class="h-bot">${val}</div>`:''}</div>`;
  });
  document.getElementById('viewGrid').innerHTML = `<div class="heat-grid" style="grid-template-columns:repeat(3,1fr)">${cells.join('')}</div>`;
}
function renderYearlyView() {
  const data = getData();
  const years = [...new Set(Object.keys(data).map(k => parseInt(k.slice(0,4))))].sort();
  if (!years.includes(today.getFullYear())) years.push(today.getFullYear());
  const yearStats = years.map(y => {
    const yStr = String(y);
    let cost=0, tokens=0, days=0;
    Object.entries(data).forEach(([d,v]) => {
      if (!d.startsWith(yStr)) return;
      cost+=v.cost||0; tokens+=v.tokens||0; days++;
    });
    return { y, cost, tokens, days };
  });
  const maxTok = Math.max(...yearStats.map(s => _dataType === 'cost' ? s.cost : s.tokens), 1);
  const cells = yearStats.map(({ y, cost, tokens, days }) => {
    const tc = tokens > 0 ? tierClass(tokens/Math.max(days,1)) : '';
    const isCur = y === today.getFullYear();
    const val = _dataType === 'cost'
      ? (cost > 0 ? `$${cost.toFixed(2)}` : '')
      : fmtTokenCN(tokens);
    return `<div class="heat-cell ${tc||'heat-empty'}${isCur?' heat-cur':''}"><div class="h-top">${isCur?t('thisYear'):(_lang==='en'?y:y+'年')}</div>${val?`<div class="h-bot">${val}</div>`:''}</div>`;
  }).join('');
  document.getElementById('viewGrid').innerHTML = `<div class="heat-grid" style="grid-template-columns:repeat(3,1fr)">${cells}</div>`;
}

// ── scroll lock ──
function _lockScroll() {
  _scrollY = window.scrollY;
  document.body.style.top = `-${_scrollY}px`;
  document.body.classList.add('sheet-open');
}
function _unlockScroll() {
  document.body.classList.remove('sheet-open');
  document.body.style.top = '';
  window.scrollTo(0, _scrollY);
}

// ── drag-to-dismiss ──
function _attachDragToDismiss(sheetEl, closeFn) {
  const handle = sheetEl.querySelector('.sheet-handle');
  if (!handle) return;
  let startY = 0, curDy = 0, active = false;

  function onStart(e) {
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startY = clientY; curDy = 0; active = true;
    sheetEl.style.transition = 'none';
  }
  function onMove(e) {
    if (!active) return;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = clientY - startY;
    if (dy < 0) return;
    curDy = dy;
    e.preventDefault();
    sheetEl.style.transform = `translateX(-50%) translateY(${dy}px)`;
  }
  function onEnd() {
    if (!active) return;
    active = false;
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onEnd);
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onEnd);
    if (curDy > 80) {
      sheetEl.style.transition = 'transform 260ms cubic-bezier(.4,0,.2,1)';
      sheetEl.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => { sheetEl.style.transition = ''; sheetEl.style.transform = ''; closeFn(); }, 260);
    } else {
      sheetEl.style.transition = '';
      sheetEl.style.transform = '';
    }
  }

  handle.addEventListener('touchstart', e => {
    onStart(e);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);
  }, { passive: true });
  handle.addEventListener('mousedown', e => {
    onStart(e);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
  });
}

// ── day sheet ──
function openSheet(dateKey, rec) {
  const [y,m,d] = dateKey.split('-');
  const dowIdx = new Date(+y,+m-1,+d).getDay();
  const dow = t('dowFull')[dowIdx];
  document.getElementById('sheetDate').textContent   = _lang==='en'
    ? `${t('mon')[+m-1]} ${+d}, ${y}  ${dow}`
    : `${y} 年 ${+m} 月 ${+d} 日  ${dow}`;
  document.getElementById('sheetModelsLabel').textContent = t('models');
  document.getElementById('sheetCost').textContent   = rec.cost > 0 ? `$${rec.cost.toFixed(2)}` : '$0.00';
  document.getElementById('sheetCny').textContent    = rec.cost > 0 ? `≈ ¥${Math.round(rec.cost*CNY_RATE).toLocaleString()} 元` : '';
  document.getElementById('sheetTokens').textContent = `${fmtTokensWest(rec.tokens)} tokens`;
  document.getElementById('sheetModels').innerHTML   = rec.models.map(m=>`<span class="model-tag">${m}</span>`).join('');
  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('sheet').classList.add('visible');
  _lockScroll();
  _attachDragToDismiss(document.getElementById('sheet'), closeSheet);
}
function closeSheet() {
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('sheet').classList.remove('visible');
  _unlockScroll();
}

  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-soft', hexToRgba(color, .15));
  document.documentElement.style.setProperty('--accent-glow', hexToRgba(color, .30));
  setTierVars(color);
  syncSwatches();
}
function syncSwatches() {
  document.querySelectorAll('.swatch').forEach(s => {
    const on = s.dataset.c === accentColor;
    s.classList.toggle('on', on);
    s.textContent = on ? '✓' : '';
  });
}

// ── import ──
function openModal() {
  document.getElementById('importTA').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('modalPreview').textContent = '';
  document.getElementById('importFile').value = '';
  document.getElementById('modalBackdrop').classList.add('visible');
}
function closeModal() { document.getElementById('modalBackdrop').classList.remove('visible'); }

function handleFileUpload(input) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('importTA').value = e.target.result; autoPreview(); };
  reader.readAsText(f);
}

function autoPreview() {
  const raw = document.getElementById('importTA').value.trim();
  const preview = document.getElementById('modalPreview');
  document.getElementById('modalError').textContent = '';
  if (!raw) { preview.textContent = ''; return; }
  try {
    const rows = parseInput(raw);
    preview.textContent = rows ? `${t('parsed')} ${Object.keys(rows).length} ${t('records')}` : (_lang==='en'?'Format not recognized':'格式未识别');
  } catch(e) { preview.textContent = ''; }
}

function parseInput(raw) {
  if (raw.trimStart().startsWith('{') || raw.trimStart().startsWith('[')) return parseJSONInput(raw);
  return parseCSVInput(raw);
}

function parseJSONInput(raw) {
  const parsed = JSON.parse(raw);
  const src = Array.isArray(parsed)
    ? Object.fromEntries(parsed.map(r => [r.date || r.Date, r]))
    : parsed;
  const out = {};
  for (const [k, v] of Object.entries(src)) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(k)) continue;
    if (typeof v.cost !== 'number' || typeof v.tokens !== 'number') continue;
    out[k] = { cost: v.cost, tokens: v.tokens, models: Array.isArray(v.models) ? v.models : [] };
  }
  return out;
}

function splitCSVRow(line) {
  const cols = []; let cur = '', q = false;
  for (const ch of line) {
    if (ch === '"') { q = !q; }
    else if (ch === ',' && !q) { cols.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSVInput(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return null;
  const headers = splitCSVRow(lines[0]).map(h => h.toLowerCase().replace(/"/g, '').replace(/[^a-z0-9]/g, ' ').trim());
  const colOf = (...kws) => headers.findIndex(h => kws.some(kw => h.includes(kw)));
  const dateIdx  = colOf('date', 'day');
  const costIdx  = colOf('cost', 'price');
  const inpIdx   = colOf('input token', 'input_token');
  const outIdx   = colOf('output token', 'output_token');
  const tokIdx   = colOf('token');
  const modelIdx = colOf('model');
  if (dateIdx === -1) return null;
  const daily = {};
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSVRow(lines[i]);
    const date = (c[dateIdx] || '').replace(/"/g, '');
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
    let tokens = 0, cost = 0, model = '';
    if (inpIdx !== -1 && outIdx !== -1) {
      tokens = (parseInt(c[inpIdx]) || 0) + (parseInt(c[outIdx]) || 0);
    } else if (tokIdx !== -1) {
      tokens = parseInt(c[tokIdx]) || 0;
    }
    if (costIdx !== -1) cost = parseFloat(c[costIdx]) || 0;
    if (modelIdx !== -1) model = (c[modelIdx] || '').replace(/"/g, '').trim();
    if (!daily[date]) daily[date] = { cost: 0, tokens: 0, models: [] };
    daily[date].cost = Math.round((daily[date].cost + cost) * 1e4) / 1e4;
    daily[date].tokens += tokens;
    if (model && !daily[date].models.includes(model)) daily[date].models.push(model);
  }
  return Object.keys(daily).length ? daily : null;
}

function doImport() {
  const raw = document.getElementById('importTA').value.trim();
  const errEl = document.getElementById('modalError');
  errEl.textContent = '';
  if (!raw) { errEl.textContent = t('errEmpty'); return; }
  let rows;
  try { rows = parseInput(raw); } catch(e) { errEl.textContent = t('errJson'); return; }
  if (!rows || !Object.keys(rows).length) { errEl.textContent = t('errNoData'); return; }
  const data = getData();
  for (const [k, v] of Object.entries(rows)) data[k] = v;
  saveData(data); closeModal(); render();
}

// ── poster ──
function openPoster() {
  const data   = getData();
  const pY     = curYear, pM = curMonth;
  const prefix = `${pY}-${String(pM+1).padStart(2,'0')}`;
  const totalDays = new Date(pY, pM+1, 0).getDate();
  const startDow  = new Date(pY, pM, 1).getDay();

  let totalCost=0, totalTokens=0, peakCost=0, peakDay='';
  const monthAmts = [];
  for (let d=1; d<=totalDays; d++) {
    const k = `${prefix}-${String(d).padStart(2,'0')}`;
    const v = data[k];
    if (!v) continue;
    totalCost   += v.cost;
    totalTokens += v.tokens;
    if (v.tokens > 0) monthAmts.push({d, tokens: v.tokens, cost: v.cost});
    if (v.cost > peakCost) { peakCost = v.cost; peakDay = `${pM+1}/${d}`; }
  }
  const maxTokens = monthAmts.length ? Math.max(...monthAmts.map(x=>x.tokens)) : 1;

  // calendar grid html
  const isZh = _lang === 'zh';
  const DOW_LABELS = isZh ? ['日','一','二','三','四','五','六'] : ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let calHtml = DOW_LABELS.map(l=>`<div class="pc-dow">${l}</div>`).join('');
  for (let i=0; i<startDow; i++) calHtml += `<div class="pc-mday empty"></div>`;
  const todayD = (pY===today.getFullYear()&&pM===today.getMonth()) ? today.getDate() : -1;
  for (let d=1; d<=totalDays; d++) {
    const k = `${prefix}-${String(d).padStart(2,'0')}`;
    const v = data[k];
    const isToday  = d===todayD;
    const isFuture = d > (todayD > 0 ? todayD : totalDays);
    let cls = 'pc-mday' + (isToday?' today':'') + (isFuture?' future':'');
    let style = '';
    if (v && v.tokens > 0 && !isToday && !isFuture) {
      const ratio = Math.min(v.tokens / maxTokens, 1);
      const alpha = (0.08 + ratio * 0.47).toFixed(2);
      const r2 = parseInt(accentColor.slice(1,3),16);
      const g2 = parseInt(accentColor.slice(3,5),16);
      const b2 = parseInt(accentColor.slice(5,7),16);
      const textColor = ratio > 0.55 ? '#fff' : accentColor;
      const numColor  = ratio > 0.55 ? 'rgba(255,255,255,.6)' : '#bbb';
      style = `background:rgba(${r2},${g2},${b2},${alpha})`;
      calHtml += `<div class="${cls}" style="${style}"><span class="mday-num" style="color:${numColor}">${d}</span><span class="mday-tok" style="color:${textColor}">${fmtTokenShort(v.tokens)}</span></div>`;
      continue;
    }
    calHtml += `<div class="${cls}"><span class="mday-num">${d}</span></div>`;
  }

  const MONTH_NAMES = isZh
    ? ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月']
    : ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // ball decorations (tinted by accent)
  const r3=parseInt(accentColor.slice(1,3),16), g3=parseInt(accentColor.slice(3,5),16), b3=parseInt(accentColor.slice(5,7),16);
  const lighten = (amt) => `rgb(${Math.min(255,r3+amt)},${Math.min(255,g3+amt)},${Math.min(255,b3+amt)})`;
  const balls = [
    [110,-8,-8, lighten(60), accentColor],
    [80,-5,62,  lighten(80), lighten(40)],
    [90,72,-6,  lighten(30), accentColor],
    [70,80,74,  lighten(50), accentColor],
    [48,42,90,  '#fff',      lighten(80)],
  ];
  const ballsHtml = balls.map(([sz,top,left,c1,c2]) =>
    `<div class="po-ball" style="width:${sz}px;height:${sz}px;top:${top}%;left:${left}%;background:radial-gradient(circle at 35% 30%,${c1},${c2});box-shadow:inset -4px -6px 12px rgba(0,0,0,.18),inset 4px 4px 8px rgba(255,255,255,.3);filter:blur(0px)"></div>`
  ).join('');

  const div = document.createElement('div');
  div.id = 'poster-overlay';
  div.innerHTML = `
    ${ballsHtml}
    <button class="po-close" onclick="closePoster()">✕</button>
    <div class="poster-card" id="poster-card">
      <div class="pc-card-top">
        <div class="pc-app-row">
          <div class="pc-app-icon" style="background:linear-gradient(135deg,${lighten(60)},${accentColor})">🤖</div>
          <div>
            <div class="pc-app-name">${isZh ? 'Token 日历' : 'Token Calendar'}</div>
            <div class="pc-app-desc">${isZh ? `${pY}年 ${MONTH_NAMES[pM]} · Claude Code 用量` : `${MONTH_NAMES[pM]} ${pY} · Claude Code usage`}</div>
          </div>
        </div>
      </div>
      <div class="pc-data">
        <div class="pc-data-row">
          <div class="pc-data-item">
            <div class="pc-data-val" style="font-size:18px">$${totalCost.toFixed(2)}</div>
            <div class="pc-data-lbl">💰 ${isZh ? '月度花费' : 'Spent'}</div>
          </div>
          <div class="pc-data-item">
            <div class="pc-data-val" style="font-size:18px">${fmtTokensWest(totalTokens)}</div>
            <div class="pc-data-lbl">⚡ ${isZh ? '总 Token' : 'Tokens'}</div>
          </div>
          <div class="pc-data-item">
            <div class="pc-data-val" style="font-size:18px">$${peakCost.toFixed(0)}</div>
            <div class="pc-data-lbl">🔥 ${isZh ? '单日峰值' : 'Peak day'}</div>
          </div>
        </div>
      </div>
      <div class="pc-cal-grid">${calHtml}</div>
      <div class="pc-foot">
        <div class="pc-foot-left">
          <div class="pc-by">Shared by</div>
          <div class="pc-name">Hakar</div>
          <div class="pc-built">Built with Claude ✦</div>
        </div>
        <div class="pc-qr-wrap">
          <img class="pc-qr-img" crossorigin="anonymous"
            src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://yifanliu734-coder.github.io/token-calendar/&bgcolor=ffffff&color=1A1A1A&margin=8" alt="QR">
          <span class="pc-qr-hint">${isZh ? '扫码体验' : 'Scan to try'}</span>
        </div>
      </div>
    </div>
    <button class="po-save-btn" onclick="savePoster()">⬇ ${isZh ? '保存海报' : 'Save poster'}</button>
  `;
  document.body.appendChild(div);
  div.style.opacity = '0';
  div.style.transition = 'opacity .2s';
  requestAnimationFrame(() => { div.style.opacity = '1'; });
}

function closePoster() {
  const ov = document.getElementById('poster-overlay');
  if (!ov) return;
  ov.style.transition = 'opacity .2s';
  ov.style.opacity = '0';
  setTimeout(() => ov.remove(), 220);
}

function savePoster() {
  const card = document.getElementById('poster-card');
  if (!card) return;
  const btn = document.querySelector('.po-save-btn');
  if (btn) { btn.textContent = '生成中…'; btn.disabled = true; }
  const img = card.querySelector('.pc-qr-img');
  const doCapture = () => {
    html2canvas(card, {
      scale: 3, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff', logging: false,
      onclone: doc => {
        doc.querySelectorAll('*').forEach(el => { el.style.transition = 'none'; el.style.animation = 'none'; });
      },
    }).then(canvas => {
      const url = canvas.toDataURL('image/png');
      const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
      if (isMobile) {
        const w = window.open('');
        if (w) {
          w.document.write(`<img src="${url}" style="width:100%;max-width:420px;display:block;margin:auto">`);
          w.document.write('<p style="text-align:center;font-family:system-ui;color:#666;margin:12px;font-size:13px">长按图片 → 存储到相册</p>');
        }
      } else {
        const a = document.createElement('a');
        a.download = `token-calendar-${curYear}-${String(curMonth+1).padStart(2,'0')}.png`;
        a.href = url; a.click();
      }
      if (btn) { btn.textContent = '⬇ 保存海报'; btn.disabled = false; }
    }).catch(() => {
      if (btn) { btn.textContent = '⬇ 保存海报'; btn.disabled = false; }
    });
  };
  if (img && !img.complete) { img.onload = doCapture; img.onerror = doCapture; }
  else doCapture();
}

// ── touch swipe on calendar → switch month (like finance calendar) ──
let _calTouchX = null, _calTouchY = null;
document.addEventListener('touchstart', e => {
  if (document.querySelector('.sheet.visible, .backdrop.visible')) return;
  const cal = document.getElementById('calGrid');
  if (!cal || !cal.contains(e.target)) return;
  _calTouchX = e.touches[0].clientX;
  _calTouchY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (_calTouchX === null) return;
  const dx = e.changedTouches[0].clientX - _calTouchX;
  const dy = e.changedTouches[0].clientY - _calTouchY;
  _calTouchX = null; _calTouchY = null;
  if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx) * 0.8) return;
  if (dx < 0) { _navDir = 1;  curMonth++; if(curMonth>11){curMonth=0;curYear++;} }
  else        { _navDir = -1; curMonth--; if(curMonth<0){curMonth=11;curYear--;} }
  render();
});

// ── sync ──
async function syncToday() {
  const btn = document.getElementById('refreshBtn');
  btn.style.opacity = '0.35';
  btn.style.pointerEvents = 'none';
  showToast('Syncing…', '');
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 6000);
  try {
    const res = await fetch('http://localhost:7777/daily', { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    const rows = parseJSONInput(JSON.stringify(json));
    if (!rows || !Object.keys(rows).length) throw new Error('no data');
    const data = getData();
    Object.assign(data, rows);
    saveData(data);
    render();
    showToast('Updated ' + Object.keys(rows).length + ' day(s)', 'ok');
  } catch (e) {
    clearTimeout(tid);
    showToast('Failed — is server.js running?', 'err');
  } finally {
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }
}

function showToast(msg, type) {
  const el = document.getElementById('syncToast');
  el.textContent = msg;
  el.className = 'sync-toast visible' + (type ? ' ' + type : '');
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('visible'), 3000);
}

// ── nav ──
document.getElementById('monthTitle').onclick = () => { _navDir = 0; curYear=today.getFullYear(); curMonth=today.getMonth(); switchViewTab('daily'); };
document.getElementById('shareBtn').onclick = openPoster;
document.getElementById('settingsBtn').onclick = openSettings;
document.getElementById('refreshBtn').onclick = syncToday;

init();
